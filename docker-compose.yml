version: "3.8"

services:
  finguru:
    build:
      context: ./
      args:
        GITHUB_PAT: "${GITHUB_PAT}"
    container_name: finguru
    restart: always
    networks:
      - app_network

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    depends_on:
      - finguru
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
